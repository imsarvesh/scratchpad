# Fly.io WebSocket server for Scratchpad
#   brew install flyctl
#   fly auth login
#   fly launch --no-deploy   # or: fly apps create scratchpad-ws
#   fly secrets set REDIS_URL="rediss://..."
#   fly deploy
# Then set Vercel NEXT_PUBLIC_WS_URL=wss://scratchpad-ws.fly.dev and redeploy.

app = 'scratchpad-ws'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
