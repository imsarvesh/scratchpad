# Fly.io WebSocket server for Scratchpad
# Deploy: fly launch (first time) then fly deploy
# Set secrets: fly secrets set REDIS_URL=redis://...

app = 'scratchpad-ws'
primary_region = 'lhr'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
